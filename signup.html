<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="form-container">
        <div class="form-blob">
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--1"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--2"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--3"
          />
        </div>

        <div class="form-header">
          <p>Create your account</p>
          <h1>Sign Up</h1>
        </div>

        <form class="form-box">
          <div class="input-group">
            <input
              type="text"
              id="name"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="name" class="floating-label">Full name</label>
          </div>

          <div class="input-group">
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="email" class="floating-label">Email address</label>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="signup-password"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="signup-password" class="floating-label">Password</label>

            <div
              class="eye-icon"
              onclick="toggleSignupPassword('signup-password', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696
           10.75 10.75 0 0 1 19.876 0
           1 1 0 0 1 0 .696
           10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="confirm-password"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="confirm-password" class="floating-label">
              Confirm password
            </label>

            <div
              class="eye-icon"
              onclick="toggleSignupPassword('confirm-password', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696
           10.75 10.75 0 0 1 19.876 0
           1 1 0 0 1 0 .696
           10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <div class="input-group checkbox-group">
            <div class="form-col remember-me">
              <input type="checkbox" id="terms" required />
              <label for="terms">
                I agree to the
                <a href="#" class="form-link">terms & conditions</a>
              </label>
            </div>
          </div>

          <button type="submit" class="form-btn form-btn--submit">
            Create Account
          </button>
        </form>

        <div class="form-divider">
          <p>Or</p>
        </div>

        <div class="form-bottom">

          <div class="social-single">
            <button class="google-btn">
              <img src="assets/images/google.svg" alt="Google" />
              <span>Sign up with Google</span>
            </button>
          </div>

          <div class="signup-text">
            <p>
              Already have an account?
              <a href="index.html" class="form-link">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="assets/js/auth.js"></script>

  </body>
</html>
