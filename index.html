<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User login</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="form-container">
        <div class="form-blob">
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--1"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--2"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--3"
          />
        </div>

        <div class="form-header">
          <p>Please enter your details</p>
          <h1>Welcome Back</h1>
        </div>

        <form class="form-box">
          <div class="input-group">
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="email" class="floating-label">Email address</label>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder=" "
              required
            />
            <label for="password" class="floating-label">Password</label>

            <div class="eye-icon" onclick="togglePassword()">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye-icon lucide-eye"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 
                                     10.75 10.75 0 0 1 19.876 0 
                                     1 1 0 0 1 0 .696 
                                     10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <div class="input-group checkbox-group">
            <div class="form-col remember-me">
              <input
                type="checkbox"
                id="remember-me-checkbox"
                class="checkbox-field"
              />
              <label for="remember-me-checkbox">Remember me</label>
            </div>

            <div class="form-col">
              <a href="#" id="forgotPassword" class="form-link">Forgot password?</a>
            </div>
          </div>

          <button type="submit" class="form-btn form-btn--submit">
            Sign In
          </button>
        </form>

        <div class="form-divider">
          <p>Or</p>
        </div>

        <div class="form-bottom">
          <div class="social-single">
            <button class="google-btn">
              <img src="assets/images/google.svg" alt="Google" />
              <span>Sign in with Google</span>
            </button>
          </div>

          <div class="signup-text">
            <p>
              Don't have an account?
              <a href="signup.html" class="form-link">Sign up</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="assets/js/auth.js"></script>

  </body>
</html>
